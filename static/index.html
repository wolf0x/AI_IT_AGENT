<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#ffffff;--bg2:#f8f9fa;--glass:#f8f9fa;--border:#ecf0f1;--t1:#2c3e50;--t2:#7f8c8d;--t3:#95a5a6;--accent:#3498db;--purple:#764ba2;--cyan:#1abc9c;--red:#e74c3c;--green:#2ecc71;--orange:#e67e22;--radius:12px;--rs:6px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;--mono:'SF Mono','Cascadia Code','Fira Code',Consolas,monospace}
body{font-family:var(--font);background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px;overflow:hidden}
.hidden{display:none!important}
.container{max-width:1560px;margin:0 auto;height:calc(100vh - 40px);background:white;border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,.3);display:flex;overflow:hidden}

/* Sidebar */
.sidebar{width:220px;background:#2c3e50;color:white;display:flex;flex-direction:column;border-right:1px solid #34495e;flex-shrink:0}
.sidebar-hdr{padding:20px;border-bottom:1px solid #34495e}
.sidebar-hdr h2{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px;color:white}
.sidebar-hdr p{font-size:11px;color:#95a5a6;margin-top:4px}
.nav-tabs{display:flex;flex-direction:column;gap:4px;padding:8px}
.nav-tab{padding:12px 16px;background:0;border:0;color:#bdc3c7;text-align:left;cursor:pointer;border-radius:var(--rs);font-size:14px;font-weight:500;transition:.2s}
.nav-tab:hover{background:#34495e;color:white}
.nav-tab.active{background:#3498db;color:#fff}
.sidebar-ftr{padding:12px 16px;border-top:1px solid #34495e;margin-top:auto;font-size:12px;color:#95a5a6}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);margin-right:6px;animation:pulse 2s infinite}
.status-dot.ok{background:var(--green);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Pages */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.page{display:none;flex:1;flex-direction:column;overflow:hidden}
.page.active{display:flex}

/* Settings */
.settings-scroll{overflow-y:auto;padding:24px;flex:1}
.settings-section{margin-bottom:24px}
.settings-section h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--t1);border-bottom:1px solid var(--border);padding-bottom:8px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:10px 12px;background:white;border:1px solid #bdc3c7;border-radius:var(--rs);color:var(--t1);font-size:14px;outline:0;font-family:inherit}
.form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(52,152,219,.1)}
.btn{padding:8px 16px;border:0;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit}
.btn-p{background:#3498db;color:#fff}.btn-p:hover{background:#2980b9;transform:translateY(-2px);box-shadow:0 4px 12px rgba(52,152,219,.3)}
.btn-s{background:#95a5a6;color:#fff}.btn-s:hover{background:#7f8c8d}
.btn-d{background:#e74c3c;color:#fff}.btn-d:hover{background:#c0392b}
.btn-row{display:flex;gap:8px;margin-top:12px}

/* Chat panels */
.chat-panels{display:flex;flex:1;overflow:hidden}
.chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border);min-width:0}
.conv-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.log-panel{width:280px;display:flex;flex-direction:column;background:#f0f3f5;flex-shrink:0}
.log-hdr{padding:10px 14px;font-size:11px;font-weight:600;color:var(--t3);background:#e8ecee;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px}
.log-area{flex:1;overflow-y:auto;padding:8px;font-size:11px;color:var(--t2);line-height:1.5}
.log-entry{padding:3px 6px;margin-bottom:3px;border-radius:4px;border-left:3px solid var(--border);background:rgba(0,0,0,.02);word-break:break-word}
.log-entry.info{border-left-color:var(--accent)}
.log-entry.warn{border-left-color:var(--orange);background:rgba(230,126,34,.08)}
.log-entry.error{border-left-color:var(--red);background:rgba(231,76,60,.08)}
.log-entry.tool{border-left-color:var(--cyan);background:rgba(26,188,156,.08)}
.log-entry.thinking{border-left-color:var(--purple);background:rgba(118,75,162,.08);font-style:italic}
.log-time{font-size:9px;color:var(--t3);margin-right:4px}

/* Messages */
.msg{display:flex;align-items:flex-start;gap:8px;animation:fadeIn .3s}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.msg.user .msg-avatar{background:var(--accent)}
.msg.assistant .msg-avatar{background:var(--green)}
.msg-body{display:flex;flex-direction:column;max-width:70%;min-width:0}
.msg.assistant .msg-body{max-width:85%}
.msg.user .msg-body{align-items:flex-end}
.msg-role{font-size:10px;font-weight:600;margin-bottom:2px;padding:0 6px}
.msg.user .msg-role{color:var(--accent)}
.msg.assistant .msg-role{color:var(--green)}
.msg-content{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.6;word-wrap:break-word;overflow-x:auto}
.msg.user .msg-content{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg.assistant .msg-content{background:#ecf0f1;color:#2c3e50;border-bottom-left-radius:4px}
.msg-time{font-size:10px;color:var(--t3);margin-top:2px;padding:0 6px}

/* 鈹€鈹€ Markdown Content Styling (full GFM, ref: NclawX) 鈹€鈹€ */
.md-content{color:var(--t1);line-height:1.7;word-wrap:break-word;overflow-wrap:break-word}
.md-content h1,.md-content h2,.md-content h3,.md-content h4,.md-content h5,.md-content h6{color:var(--t1);font-weight:600;margin:.8em 0 .4em 0;line-height:1.3}
.md-content h1{font-size:1.5em;border-bottom:1px solid var(--border);padding-bottom:.25em}
.md-content h2{font-size:1.3em;border-bottom:1px solid var(--border);padding-bottom:.2em}
.md-content h3{font-size:1.12em}.md-content h4{font-size:1em}.md-content h5{font-size:.92em}.md-content h6{font-size:.88em;color:var(--t2)}
.md-content p{margin:.5em 0}.md-content p:last-child{margin:0}
.md-content strong,.md-content b{color:var(--t1);font-weight:600}
.md-content em,.md-content i{color:var(--t2);font-style:italic}
.md-content ul,.md-content ol{margin:.4em 0 .4em 1.8em;padding-left:0}
.md-content li{margin:.2em 0;color:var(--t1);line-height:1.6}
.md-content ul li{list-style-type:disc}
.md-content ol li{list-style-type:decimal}
.md-content li>ul,.md-content li>ol{margin:.15em 0 .15em 1.5em}
.md-content code{background:rgba(110,118,129,.15);color:#c0392b;padding:.12em .35em;border-radius:4px;font-size:.88em;font-family:var(--mono);word-break:break-word}
.md-content pre{background:#1e1e1e;color:#d4d4d4;padding:.75rem 1rem;border-radius:var(--rs);border:1px solid #333;overflow-x:auto;margin:.6em 0;position:relative}
.md-content pre code{background:transparent;color:#d4d4d4;padding:0;border-radius:0;font-size:.85em;word-break:normal}
.md-content blockquote{border-left:3px solid var(--accent);color:var(--t2);margin:.5em 0;padding:.3em 1em;font-style:italic;background:rgba(52,152,219,.05);border-radius:0 var(--rs) var(--rs) 0}
.md-content a{color:var(--accent);text-decoration:none;transition:color .2s}
.md-content a:hover{color:var(--purple);text-decoration:underline}
.md-content table{border-collapse:collapse;width:100%;margin:.6em 0;border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.md-content table th,.md-content table td{padding:.45em .75em;text-align:left;border-bottom:1px solid var(--border)}
.md-content table th{background:#f0f3f5;color:var(--t1);font-weight:600;font-size:.9em}
.md-content table tr:hover{background:rgba(0,0,0,.02)}
.md-content table tr:last-child td{border-bottom:none}
.md-content del{color:var(--t3);text-decoration:line-through}
.md-content hr{border:none;border-top:1px solid var(--border);margin:1em 0}
.md-content img{max-width:100%;border-radius:var(--rs);margin:.4em 0}
.copy-btn{position:absolute;top:6px;right:6px;background:rgba(255,255,255,.15);color:#aaa;border:1px solid #555;border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;opacity:0;transition:opacity .2s}
.md-content pre:hover .copy-btn{opacity:1}
.md-content .copy-btn:hover{background:var(--border);color:var(--t1)}

/* 鈹€鈹€ Thinking Block 鈹€鈹€ */
.think-block{border-radius:var(--rs);margin:6px 0;overflow:hidden;transition:all .3s}
.think-block.active{border:1px solid rgba(118,75,162,.3);background:rgba(118,75,162,.06);animation:pulseP 2s infinite}
.think-block.done{border:1px solid rgba(118,75,162,.15);background:rgba(118,75,162,.04)}
.think-hdr{display:flex;align-items:center;gap:6px;padding:8px 12px;cursor:pointer;font-size:12px;color:var(--purple);font-weight:500;user-select:none;transition:background .2s}
.think-hdr:hover{background:rgba(118,75,162,.08)}
.think-hdr .arrow{margin-left:auto;transition:transform .3s;font-size:10px}
.think-hdr .arrow.open{transform:rotate(180deg)}
.think-body{overflow:hidden;padding:0 12px;max-height:2000px;transition:max-height .4s ease,padding .3s}
.think-body:not(.open){max-height:0;padding:0 12px;overflow:hidden}
.think-body.open{padding:0 12px 10px;overflow-y:auto}
.think-text{font-size:12px;color:var(--t2);font-style:italic;line-height:1.5;white-space:pre-wrap}

/* 鈹€鈹€ Tool Block 鈹€鈹€ */
.tool-block{border-radius:var(--rs);margin:6px 0;transition:all .3s}
.tool-block.active{border:1px solid rgba(52,152,219,.3);background:rgba(52,152,219,.06)}
.tool-block.done{border:1px solid rgba(52,152,219,.2);background:rgba(52,152,219,.04)}
.tool-hdr{display:flex;align-items:center;gap:6px;padding:8px 12px;cursor:pointer;font-size:12px;color:var(--cyan);font-weight:500;user-select:none;transition:background .2s}
.tool-hdr:hover{background:rgba(52,152,219,.08)}
.tool-hdr .arrow{margin-left:auto;transition:transform .3s;font-size:10px}
.tool-hdr .arrow.open{transform:rotate(180deg)}
.tool-body{overflow:hidden;transition:max-height .4s ease;padding:0 12px}
.tool-body.open{max-height:2000px;padding:0 12px 10px;overflow-y:auto}
.tool-body:not(.open){max-height:0;padding:0 12px;overflow:hidden}
.tool-body pre{background:#1e1e1e;border-radius:4px;padding:8px;font-size:11px;font-family:var(--mono);color:#d4d4d4;overflow-x:auto;white-space:pre-wrap;margin:4px 0}
.tool-summary{font-size:11px;color:var(--t3);margin-left:8px;font-weight:400;max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

@keyframes pulseP{0%,100%{box-shadow:0 0 0 0 rgba(118,75,162,0)}50%{box-shadow:0 0 10px 2px rgba(118,75,162,.15)}}
@keyframes pulseC{0%,100%{box-shadow:0 0 0 0 rgba(26,188,156,0)}50%{box-shadow:0 0 10px 2px rgba(26,188,156,.15)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Stop button */
.btn-stop{background:#e74c3c;color:#fff;display:none}.btn-stop:hover{background:#c0392b}
.btn-stop.visible{display:flex}
.btn-send.hidden{display:none}

/* Permission Toggles */
.perm-section{margin-bottom:16px}
.perm-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:white;border:1px solid var(--border);border-radius:var(--rs);margin-bottom:8px;transition:border-color .2s}
.perm-item:hover{border-color:var(--accent)}
.perm-info{flex:1}
.perm-name{font-size:13px;font-weight:600;color:var(--t1)}
.perm-tools{font-size:11px;color:var(--t3);margin-top:2px}
.perm-status{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-right:10px}
.perm-status.allowed{background:#d4efdf;color:#27ae60}
.perm-status.endorse{background:#fdebd0;color:#e67e22}
.perm-toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.perm-toggle input{opacity:0;width:0;height:0}
.perm-toggle .slider{position:absolute;inset:0;background:#bdc3c7;border-radius:24px;cursor:pointer;transition:.3s}
.perm-toggle .slider:before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s}
.perm-toggle input:checked+.slider{background:#27ae60}
.perm-toggle input:checked+.slider:before{transform:translateX(20px)}

/* Permission Request Card */
.perm-request{border:2px solid #e67e22;border-radius:var(--rs);margin:10px 0;overflow:visible;animation:fadeIn .3s;background:#fffaf3;display:block}
.perm-request .perm-req-hdr{padding:10px 14px;background:linear-gradient(135deg,#fef5e7,#fdebd0);font-size:13px;font-weight:700;color:#c0702a;display:flex;align-items:center;gap:6px;border-bottom:1px solid #f5d6a8}
.perm-request .perm-req-body{padding:12px 14px;font-size:13px;color:var(--t1)}
.perm-request .perm-req-body b{color:var(--t1);font-weight:700}
.perm-request .perm-req-body .perm-cat{font-size:11px;background:#fdebd0;color:#c0702a;padding:2px 8px;border-radius:10px;margin-left:8px;font-weight:600}
.perm-request .perm-req-body pre{background:#1e1e2e;border-radius:6px;padding:8px 10px;font-size:11px;font-family:var(--mono);color:#d4d4d4;overflow-x:auto;white-space:pre-wrap;margin:8px 0;max-height:120px;overflow-y:auto;line-height:1.5}
.perm-request .perm-req-actions{display:flex;gap:10px;padding:10px 14px;border-top:1px solid #f5d6a8}
.perm-request .perm-req-actions button{padding:8px 20px;border:0;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;transition:background .2s,transform .1s}
.perm-request .perm-req-actions button:active{transform:scale(.96)}
.perm-request .perm-req-actions .btn-allow{background:#27ae60;color:#fff}.perm-request .perm-req-actions .btn-allow:hover{background:#219a52}
.perm-request .perm-req-actions .btn-deny{background:#e74c3c;color:#fff}.perm-request .perm-req-actions .btn-deny:hover{background:#c0392b}
.perm-request.resolved{opacity:.65;border-style:dashed}
.perm-request.resolved .perm-req-actions button{display:none}
.perm-request .perm-resolved-msg{padding:10px 14px;font-size:12px;font-weight:700;text-align:center}
.perm-request .perm-resolved-msg.allowed{color:#27ae60;background:#e8f8f0;border-top:1px solid #c8e6d5}
.perm-request .perm-resolved-msg.denied{color:#e74c3c;background:#fdf0ed;border-top:1px solid #f5c6c0}

/* Input bar */
.input-bar{display:flex;align-items:flex-end;gap:10px;padding:16px 20px;background:#f8f9fa;border-top:1px solid #ecf0f1;flex-shrink:0}
.input-bar input{flex:1;padding:12px 16px;background:white;border:1px solid #bdc3c7;border-radius:var(--rs);color:var(--t1);font-size:14px;outline:0;font-family:inherit;height:44px}
.input-bar input:focus{border-color:#3498db;box-shadow:0 0 0 3px rgba(52,152,219,.1)}
.input-bar .btn{height:44px;display:flex;align-items:center;padding:10px 24px}

/* Typing dots */
.dots span{animation:dotB 1.4s infinite;font-weight:700}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes dotB{0%,80%,100%{opacity:0}40%{opacity:1}}

/* Scrollbar */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#ecf0f1}
::-webkit-scrollbar-thumb{background:#bdc3c7;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#95a5a6}

/* Responsive */
@media(max-width:1000px){.log-panel{display:none}.sidebar{width:160px}}
@media(max-width:700px){body{padding:0}.container{height:100vh;border-radius:0;border:0}.sidebar{width:50px}.sidebar-hdr h2,.sidebar-hdr p,.nav-tab span,.sidebar-ftr{display:none}.msg-body{max-width:85%!important}}
</style>
</head>
<body>
<div class="container">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-hdr">
      <h2>&#9889; RustAgent</h2>
      <p>AI System Agent</p>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchPage('chat',this)">&#128172; <span>Chat</span></button>
      <button class="nav-tab" onclick="switchPage('settings',this)">&#9881; <span>Settings</span></button>
      <button class="nav-tab" onclick="switchPage('skills',this)">&#129504; <span>Skills</span></button>
      <button class="nav-tab" onclick="switchPage('mcp',this)">&#128268; <span>MCP</span></button>
    </div>
    <div class="sidebar-ftr">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Disconnected</span>
    </div>
  </div>

  <div class="main">
    <!-- Settings Page -->
    <div id="settings" class="page">
      <div class="settings-scroll">
        <div class="settings-section">
          <h3>&#128279; Connection</h3>
          <div class="form-group">
            <label>WebSocket URL</label>
            <input type="text" id="wsUrl" value="ws://localhost:7788/ws">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="wsPwd" value="123">
          </div>
          <div class="btn-row">
            <button class="btn btn-p" onclick="connectWs()">Connect</button>
            <button class="btn btn-s" onclick="disconnectWs()">Disconnect</button>
          </div>
        </div>
        <div class="settings-section">
          <h3>&#129302; Model</h3>
          <div class="form-group">
            <label>Model (from dropdown after connect)</label>
            <select id="modelSel"><option>Connect first...</option></select>
          </div>
        </div>
        <div class="settings-section">
          <h3>&#128190; Session</h3>
          <div class="btn-row">
            <button class="btn btn-d" onclick="clearChat()">Clear Chat</button>
            <button class="btn btn-s" onclick="exportChat()">Export</button>
          </div>
        </div>
        <div class="settings-section">
          <h3>&#128274; Tool Permissions</h3>
          <div id="permList"></div>
        </div>
      </div>
    </div>

    <!-- Skills Page -->
    <div id="skills" class="page">
      <div class="settings-scroll">
        <div class="settings-section">
          <h3>&#129504; Skills</h3>
          <div id="skillList" style="font-size:13px;color:var(--t2)">Loading...</div>
        </div>
      </div>
    </div>

    <!-- MCP Page -->
    <div id="mcp" class="page">
      <div class="settings-scroll">
        <div class="settings-section">
          <h3>&#128268; MCP Servers</h3>
          <div id="mcpList" style="font-size:13px;color:var(--t2)">Loading...</div>
        </div>
      </div>
    </div>

    <!-- Chat Page -->
    <div id="chat" class="page active">
      <div class="chat-panels">
        <div class="chat-main">
          <div class="conv-area" id="convArea"></div>
          <div class="input-bar">
            <input type="text" id="msgInput" placeholder="Type a message..." disabled onkeydown="if(event.key==='Enter')sendMsg()">
            <button class="btn btn-p btn-send" id="sendBtn" onclick="sendMsg()" disabled>Send</button>
            <button class="btn btn-stop" id="stopBtn" onclick="stopAgent()">Stop</button>
          </div>
        </div>
        <div class="log-panel">
          <div class="log-hdr">&#128203; System Log</div>
          <div class="log-area" id="logArea"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// 鈹€鈹€ State 鈹€鈹€
let ws=null,connected=false,msgHist=[],logHist=[];
let curThinkEl=null,curTextEl=null,textAccum='',curToolMap={},agentRunning=false;

// Permission categories with defaults
const PERM_CATEGORIES=[
  {id:'read',name:'Read',tools:'file_read, file_list, sys_info, sys_eventlog, browser_open, web_fetch',def:true},
  {id:'write',name:'Write',tools:'file_write',def:true},
  {id:'delete',name:'Delete',tools:'file_delete',def:false},
  {id:'modify',name:'Modify',tools:'file_modify, sys_process, sys_service',def:true},
  {id:'execute',name:'Execute',tools:'shell_exec, app_launch',def:false}
];
let permissions={};
(function initPerms(){
  const saved=localStorage.getItem('rustagent_perms');
  if(saved){try{permissions=JSON.parse(saved)}catch(e){}}
  PERM_CATEGORIES.forEach(c=>{if(permissions[c.id]===undefined)permissions[c.id]=c.def});
})();

// 鈹€鈹€ Page Switch 鈹€鈹€
function switchPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  if(btn)btn.classList.add('active');
  if(name==='skills')loadSkills();
  if(name==='mcp')loadMcp();
  if(name==='chat')scrollBottom();
}

// 鈹€鈹€ WebSocket 鈹€鈹€
function connectWs(){
  const url=document.getElementById('wsUrl').value;
  const pwd=document.getElementById('wsPwd').value;
  if(!url){addLog('Enter WebSocket URL','error');return}
  addLog('Connecting...','info');
  ws=new WebSocket(url);
  ws.onopen=()=>{addLog('Authenticating...','info');ws.send(JSON.stringify({type:'auth',password:pwd}))};
  ws.onmessage=e=>{try{handleMsg(JSON.parse(e.data))}catch(err){console.error(err)}};
  ws.onerror=()=>{addLog('Connection failed','error')};
  ws.onclose=()=>{connected=false;updateStatus();addLog('Disconnected','warn')};
}
function disconnectWs(){if(ws){ws.close();ws=null}}
function updateStatus(){
  const dot=document.getElementById('statusDot'),txt=document.getElementById('statusText');
  if(connected){dot.classList.add('ok');txt.textContent='Connected';document.getElementById('msgInput').disabled=false;document.getElementById('sendBtn').disabled=false}
  else{dot.classList.remove('ok');txt.textContent='Disconnected';document.getElementById('msgInput').disabled=true;document.getElementById('sendBtn').disabled=true}
}

// 鈹€鈹€ Message Handler 鈹€鈹€
function handleMsg(msg){
  if(!msg||!msg.type)return;
  switch(msg.type){
    case 'auth_ok':connected=true;updateStatus();addLog('Authenticated','info');loadModels();sendPerms();renderPerms();break;
    case 'auth_fail':addLog('Auth failed: '+(msg.message||'bad password'),'error');break;
    case 'thinking':
      hideTyping();
      if(!curThinkEl){curThinkEl=createThinkBlock();appendToConv(curThinkEl)}
      appendThinkText(curThinkEl,msg.content);
      scrollBottom();break;
    case 'text':
      hideTyping();finalizeThink();
      let txtEl=getOrCreateTextBlock();
      appendTextContent(txtEl,msg.content);
      scrollBottom();break;
    case 'tool_call':
      hideTyping();finalizeThink();finalizeTextBlock();
      let tb=createToolBlock(msg.name,msg.call_id,msg.args);
      appendToConv(tb);curToolMap[msg.call_id]=tb;
      scrollBottom();break;
    case 'tool_result':
      let blk=curToolMap[msg.call_id];
      if(blk)updateToolResult(blk,msg.result);
      addLog('Tool: '+msg.name,'tool');
      scrollBottom();break;
    case 'error':
      hideTyping();finalizeThink();finalizeTextBlock();
      addLog('Error: '+msg.message,'error');
      scrollBottom();break;
    case 'permission_request':
      hideTyping();finalizeThink();finalizeTextBlock();
      renderPermRequest(msg);
      break;
    case 'done':
      hideTyping();finalizeThink();
      if(textAccum){msgHist.push({role:'assistant',text:textAccum.trim(),time:new Date().toLocaleTimeString()});saveHist()}
      finalizeTextBlock();
      curToolMap={};
      setAgentRunning(false);
      scrollBottom();break;
  }
}

// 鈹€鈹€ Chat Elements 鈹€鈹€
function getOrCreateTextBlock(){
  if(!curTextEl){
    curTextEl=document.createElement('div');
    curTextEl.className='msg assistant';
    curTextEl.innerHTML='<div class="msg-avatar">&#129302;</div><div class="msg-body"><div class="msg-role">Agent</div><div class="msg-content md-content"></div><div class="msg-time"></div></div>';
    document.getElementById('convArea').appendChild(curTextEl);
    textAccum='';
  }
  return curTextEl;
}
function appendTextContent(el,chunk){
  textAccum+=chunk;
  // Strip leading/trailing middle-dots (·) and ellipsis (…) artifacts
  const cleaned=textAccum.replace(/^[\s\u00B7\u2026]+/,'').replace(/[\s\u00B7\u2026]+$/,'');
  const content=el.querySelector('.msg-content');
  if(content){content.innerHTML=renderMd(cleaned);addCopyBtns(content)}
}
function finalizeTextBlock(){
  if(curTextEl){
    if(textAccum){
      // Re-render final accumulated text to ensure complete markdown (tables etc) renders correctly
      const content=curTextEl.querySelector('.msg-content');
      if(content){
        const cleaned=textAccum.replace(/^[\s\u00B7\u2026]+/,'').replace(/[\s\u00B7\u2026]+$/,'').trim();
        content.innerHTML=renderMd(cleaned);
        addCopyBtns(content);
      }
      const t=curTextEl.querySelector('.msg-time');if(t)t.textContent=new Date().toLocaleTimeString()
    } else {
      // Remove empty text block (no content accumulated)
      curTextEl.remove();
    }
  }
  curTextEl=null;textAccum='';
}
function showTyping(){
  hideTyping();
  const el=document.createElement('div');el.className='msg assistant';el.id='typingInd';
  el.innerHTML='<div class="msg-avatar">&#129302;</div><div class="msg-body"><div class="msg-role">Agent</div><div class="msg-content"><span class="dots">Thinking<span>.</span><span>.</span><span>.</span></span></div></div>';
  document.getElementById('convArea').appendChild(el);scrollBottom();
}
function hideTyping(){const el=document.getElementById('typingInd');if(el)el.remove()}

// 鈹€鈹€ Thinking Block 鈹€鈹€
function createThinkBlock(){
  const d=document.createElement('div');d.className='think-block active';
  d.innerHTML='<div class="think-hdr" onclick="toggleBlock(this)">&#128161; Thinking... <span class="arrow">&#9660;</span></div><div class="think-body"><div class="think-text"></div></div>';
  return d;
}
function appendThinkText(el,chunk){
  const t=el.querySelector('.think-text');if(t)t.textContent+=chunk;
  // Keep collapsed by default - user clicks header to expand
}
function finalizeThink(){
  if(curThinkEl){
    curThinkEl.classList.remove('active');
    curThinkEl.classList.add('done');
    // Update header to show completed state
    const hdr=curThinkEl.querySelector('.think-hdr');
    if(hdr)hdr.innerHTML='&#128161; Thinking <span style="color:var(--t3);font-weight:400">&#10003;</span> <span class="arrow">&#9660;</span>';
    // Collapse body (user can click header to expand)
    const body=curThinkEl.querySelector('.think-body');
    if(body)body.classList.remove('open');
    const arrow=curThinkEl.querySelector('.arrow');
    if(arrow)arrow.classList.remove('open');
    curThinkEl=null;
  }
}

// 鈹€鈹€ Tool Block 鈹€鈹€
function createToolBlock(name,callId,args){
  const d=document.createElement('div');d.className='tool-block active';
  let summary='';
  try{
    const a=typeof args==='string'?JSON.parse(args):args;
    if(a.command)summary=a.command.substring(0,60);
    else if(a.path)summary=a.path;
    else if(a.url)summary=a.url;
    else if(a.app||a.program)summary=a.app||a.program;
    else{const k=Object.keys(a);if(k.length)summary=k.map(k=>k+':'+JSON.stringify(a[k]).substring(0,20)).join(', ').substring(0,60)}
  }catch(e){}
  const argsStr=typeof args==='string'?args:JSON.stringify(args,null,2);
  d.innerHTML='<div class="tool-hdr" onclick="toggleBlock(this)">&#9881; '+esc(name)+(summary?' <span class="tool-summary">'+esc(summary)+'</span>':'')+' <span class="arrow">&#9660;</span></div><div class="tool-body"><div style="font-size:11px;color:var(--t3);margin-bottom:4px">Arguments</div><pre>'+esc(argsStr)+'</pre><div class="tool-result" style="display:none"><div style="font-size:11px;color:var(--t3);margin-bottom:4px">Result</div><pre class="tool-res"></pre></div></div>';
  d.dataset.callId=callId;
  return d;
}
function updateToolResult(blk,result){
  blk.classList.remove('active');
  blk.classList.add('done');
  const rs=blk.querySelector('.tool-result');
  if(rs){rs.style.display='block';rs.querySelector('.tool-res').textContent=typeof result==='string'?result:JSON.stringify(result,null,2)}
  // Keep collapsed - user clicks header to expand
}
function toggleBlock(hdr){
  const body=hdr.nextElementSibling;
  if(body){body.classList.toggle('open');const sp=hdr.querySelector('.arrow');if(sp)sp.classList.toggle('open')}
}

// 鈹€鈹€ Send 鈹€鈹€
function sendMsg(){
  const inp=document.getElementById('msgInput');const txt=inp.value.trim();
  if(!txt||!connected)return;
  showUserMsg(txt);inp.value='';
  const model=document.getElementById('modelSel').value;
  sendPerms();
  ws.send(JSON.stringify({type:'chat',content:txt,model:model||''}));
  showTyping();
  setAgentRunning(true);
  msgHist.push({role:'user',text:txt,time:new Date().toLocaleTimeString()});saveHist();
}
function stopAgent(){
  if(ws&&connected&&agentRunning){
    ws.send(JSON.stringify({type:'stop'}));
    addLog('Stop signal sent','warn');
  }
}
function setAgentRunning(running){
  agentRunning=running;
  const sendBtn=document.getElementById('sendBtn');
  const stopBtn=document.getElementById('stopBtn');
  if(running){
    sendBtn.classList.add('hidden');stopBtn.classList.add('visible');
  }else{
    sendBtn.classList.remove('hidden');stopBtn.classList.remove('visible');
  }
}
function showUserMsg(txt){
  const d=document.createElement('div');d.className='msg user';
  d.innerHTML='<div class="msg-avatar">&#128100;</div><div class="msg-body"><div class="msg-role">You</div><div class="msg-content">'+esc(txt)+'</div><div class="msg-time">'+new Date().toLocaleTimeString()+'</div></div>';
  document.getElementById('convArea').appendChild(d);scrollBottom();
}
function appendToConv(el){document.getElementById('convArea').appendChild(el);scrollBottom()}

// 鈹€鈹€ Clear/Export 鈹€鈹€
function clearChat(){
  if(ws)ws.send(JSON.stringify({type:'clear'}));
  document.getElementById('convArea').innerHTML='';
  document.getElementById('logArea').innerHTML='';
  msgHist=[];logHist=[];curToolMap={};curThinkEl=null;curTextEl=null;textAccum='';
  addLog('Chat cleared','info');
}
function exportChat(){
  const txt=msgHist.map(m=>'['+m.time+'] '+m.role+': '+m.text).join('\n');
  const blob=new Blob([txt],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='rustagent-'+Date.now()+'.txt';a.click();
}

// 鈹€鈹€ Log 鈹€鈹€
function addLog(text,cls){
  const log=document.getElementById('logArea');
  const e=document.createElement('div');e.className='log-entry '+(cls||'info');
  const t=document.createElement('span');t.className='log-time';t.textContent=new Date().toLocaleTimeString();
  e.appendChild(t);e.appendChild(document.createTextNode(' '+text));
  log.appendChild(e);log.scrollTop=log.scrollHeight;
  logHist.push({text,cls:cls||'info',time:t.textContent});saveHist();
}

// 鈹€鈹€ API 鈹€鈹€
async function loadModels(){
  try{const r=await fetch('/api/models');const d=await r.json();
    const sel=document.getElementById('modelSel');sel.innerHTML='';
    (d.models||[]).forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o)});
  }catch(e){addLog('Load models failed','error')}
}
async function loadSkills(){
  try{const r=await fetch('/api/skills');const d=await r.json();
    const el=document.getElementById('skillList');
    if(d.skills&&d.skills.length)el.innerHTML=d.skills.map(s=>'<div style="padding:6px 0;border-bottom:1px solid var(--border)"><strong>'+esc(s.name||'?')+'</strong><br><span style="color:var(--t3)">'+esc(s.description||'')+'</span></div>').join('');
    else el.innerHTML='<span style="color:var(--t3)">No skills installed</span>';
  }catch(e){document.getElementById('skillList').innerHTML='<span style="color:var(--red)">Failed to load</span>'}
}
async function loadMcp(){
  try{const r=await fetch('/api/mcp');const d=await r.json();
    const el=document.getElementById('mcpList');const servers=d.servers||[];
    if(servers.length)el.innerHTML=servers.map(s=>'<div style="padding:6px 0;border-bottom:1px solid var(--border)"><strong>'+esc(s.name||'?')+'</strong><br><span style="color:var(--t3)">'+(s.tools||[]).map(t=>t.name).join(', ')+'</span></div>').join('');
    else el.innerHTML='<span style="color:var(--t3)">No MCP servers</span>';
  }catch(e){document.getElementById('mcpList').innerHTML='<span style="color:var(--red)">Failed to load</span>'}
}

// 鈹€鈹€ Markdown Renderer (local marked.js with GFM, robust fallback) 鈹€鈹€
if(typeof marked!=='undefined'){try{marked.setOptions({breaks:false,gfm:true})}catch(e){}}
function renderMd(text){
  if(!text)return'';
  if(typeof marked!=='undefined'){try{return marked.parse(text)}catch(e){}}
  return renderMdFallback(text);
}
function renderMdFallback(text){
  text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  // Extract code blocks
  let cbs=[];let ci=0;
  text=text.replace(/```(\w*)\n([\s\S]*?)```/g,(m,lang,code)=>{cbs[ci]='<pre><code class="lang-'+(lang||'txt')+'">'+esc(code.trim())+'</code></pre>';return'\n__CB'+(ci++)+'__\n'});
  let h=esc(text);
  // Headings
  h=h.replace(/^###### (.+)$/gm,'<h6>$1</h6>').replace(/^##### (.+)$/gm,'<h5>$1</h5>').replace(/^#### (.+)$/gm,'<h4>$1</h4>');
  h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>');
  // Blockquotes
  h=h.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  // Horizontal rule
  h=h.replace(/^---$/gm,'<hr>');
  // Tables (GFM)
  h=h.replace(/^(\|.+\|)\n(\|[\s:|-]+\|)\n((?:\|.+\|\n?)*)/gm,(m,header,sep,body)=>{
    const ths=header.split('|').filter(c=>c.trim()).map(c=>'<th>'+c.trim()+'</th>').join('');
    const rows=body.trim().split('\n').map(r=>'<tr>'+r.split('|').filter(c=>c.trim()).map(c=>'<td>'+c.trim()+'</td>').join('')+'</tr>').join('');
    return'<table><thead><tr>'+ths+'</tr></thead><tbody>'+rows+'</tbody></table>'
  });
  // Strikethrough (GFM)
  h=h.replace(/~~(.+?)~~/g,'<del>$1</del>');
  // Task lists (GFM)
  h=h.replace(/^- \[x\] (.+)$/gm,'<li style="list-style:none">&#9745; $1</li>');
  h=h.replace(/^- \[ \] (.+)$/gm,'<li style="list-style:none">&#9744; $1</li>');
  // Lists
  h=h.replace(/((?:^[\s]*[-*+] .+\n?)+)/gm,m=>'<ul>'+m.trim().split('\n').map(l=>'<li>'+l.replace(/^\s*[-*+] /,'')+'</li>').join('')+'</ul>');
  h=h.replace(/((?:^[\s]*\d+\. .+\n?)+)/gm,m=>'<ol>'+m.trim().split('\n').map(l=>'<li>'+l.replace(/^\s*\d+\. /,'')+'</li>').join('')+'</ol>');
  // Inline formatting
  h=h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  // Restore code blocks
  for(let i=0;i<ci;i++)h=h.replace('__CB'+i+'__',cbs[i]);
  // Paragraphs
  let paras=h.split('\n\n');
  h=paras.map(p=>{p=p.trim();if(!p)return'';
    if(p.startsWith('<h')||p.startsWith('<table')||p.startsWith('<ul')||p.startsWith('<ol')||p.startsWith('<pre')||p.startsWith('<blockquote')||p.startsWith('<hr')||p.startsWith('<div')||p.startsWith('<li'))return p;
    if(!p.startsWith('<'))return'<p>'+p.replace(/\n/g,'<br>')+'</p>';
    return p;
  }).join('');
  return h;
}
function addCopyBtns(container){
  container.querySelectorAll('pre').forEach(pre=>{
    if(pre.querySelector('.copy-btn'))return;
    const btn=document.createElement('button');btn.className='copy-btn';btn.textContent='Copy';
    btn.onclick=()=>{const code=pre.querySelector('code')?.textContent||pre.textContent;navigator.clipboard.writeText(code).then(()=>{btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500)})};
    pre.style.position='relative';pre.appendChild(btn);
  });
}

// 鈹€鈹€ Helpers 鈹€鈹€
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function scrollBottom(){requestAnimationFrame(()=>{const a=document.getElementById('convArea');if(a)a.scrollTo({top:a.scrollHeight,behavior:'smooth'});const l=document.getElementById('logArea');if(l)l.scrollTop=l.scrollHeight})}
function saveHist(){try{localStorage.setItem('ra_msgs',JSON.stringify(msgHist.slice(-200)));localStorage.setItem('ra_logs',JSON.stringify(logHist.slice(-200)))}catch(e){}}
function showAssistantMsg(txt,time){
  const d=document.createElement('div');d.className='msg assistant';
  d.innerHTML='<div class="msg-avatar">&#129302;</div><div class="msg-body"><div class="msg-role">Agent</div><div class="msg-content md-content">'+renderMd(esc(txt))+'</div><div class="msg-time">'+(time||'')+'</div></div>';
  document.getElementById('convArea').appendChild(d);
}
function loadHist(){try{
  const m=JSON.parse(localStorage.getItem('ra_msgs')||'[]');
  const l=JSON.parse(localStorage.getItem('ra_logs')||'[]');
  m.forEach(x=>{
    if(x.role==='user')showUserMsg(x.text);
    else if(x.role==='assistant')showAssistantMsg(x.text,x.time);
  });
  l.forEach(x=>addLog(x.text,x.cls));
  msgHist=m;logHist=l;
  if(m.length)scrollBottom();
}catch(e){}}

// 鈹€鈹€ Permissions 鈹€鈹€
function renderPerms(){
  const el=document.getElementById('permList');if(!el)return;
  el.innerHTML=PERM_CATEGORIES.map(c=>{
    const allowed=permissions[c.id]!==false;
    return `<div class="perm-item">
      <div class="perm-info">
        <div class="perm-name">${c.name}</div>
        <div class="perm-tools">${c.tools}</div>
      </div>
      <span class="perm-status ${allowed?'allowed':'endorse'}">${allowed?'Allowed':'Endorsement'}</span>
      <label class="perm-toggle">
        <input type="checkbox" ${allowed?'checked':''} onchange="togglePerm('${c.id}',this.checked)">
        <span class="slider"></span>
      </label>
    </div>`;
  }).join('');
}
function togglePerm(id,val){
  permissions[id]=val;
  localStorage.setItem('rustagent_perms',JSON.stringify(permissions));
  renderPerms();
  sendPerms();
  addLog('Permission '+id+': '+(val?'allowed':'endorsement'),'info');
}
function sendPerms(){
  if(ws&&connected){
    ws.send(JSON.stringify({type:'permissions',read:permissions.read,write:permissions.write,delete:permissions.delete,modify:permissions.modify,execute:permissions.execute}));
  }
}
function renderPermRequest(msg){
  const conv=document.getElementById('convArea');
  // Add agent message restating the request
  const agentMsg=document.createElement('div');
  agentMsg.className='msg assistant';
  const toolLabel=msg.tool_name.replace(/_/g,' ');
  const catLabel=msg.category;
  let summary='I need your permission to use <b>'+esc(toolLabel)+'</b> ('+esc(catLabel)+' operation).';
  if(msg.args){
    const argsStr=typeof msg.args==='string'?msg.args:JSON.stringify(msg.args,null,2);
    try{
      const argsObj=typeof msg.args==='string'?JSON.parse(msg.args):msg.args;
      if(argsObj.command)summary+=' The command is: <code>'+esc(argsObj.command)+'</code>';
      else if(argsObj.url)summary+=' URL: <code>'+esc(argsObj.url)+'</code>';
      else if(argsObj.path)summary+=' Path: <code>'+esc(argsObj.path)+'</code>';
      else if(argsObj.app||argsObj.program)summary+=' Application: <code>'+esc(argsObj.app||argsObj.program)+'</code>';
    }catch(e){}
  }
  agentMsg.innerHTML='<div class="msg-avatar">&#129302;</div><div class="msg-body"><div class="msg-role">Agent</div><div class="msg-content md-content">'+summary+'</div><div class="msg-time">'+new Date().toLocaleTimeString()+'</div></div>';
  conv.appendChild(agentMsg);
  // Add permission card
  const card=document.createElement('div');
  card.className='perm-request';
  card.id='perm-req-'+msg.request_id;
  const argsStr=typeof msg.args==='string'?msg.args:JSON.stringify(msg.args,null,2);
  card.innerHTML=
    '<div class="perm-req-hdr">&#9888;&#65039; Permission Required</div>'+
    '<div class="perm-req-body">'+
      '<div>Tool: <b>'+esc(msg.tool_name)+'</b><span class="perm-cat">'+esc(msg.category)+'</span></div>'+
      '<pre>'+esc(argsStr)+'</pre>'+
    '</div>'+
    '<div class="perm-req-actions">'+
      '<button class="btn-allow" onclick="respondPerm(\''+msg.request_id+'\',true)">&#10003; Allow</button>'+
      '<button class="btn-deny" onclick="respondPerm(\''+msg.request_id+'\',false)">&#10007; Deny</button>'+
    '</div>';
  conv.appendChild(card);
  scrollBottom();
}
function respondPerm(requestId,allowed){
  if(ws&&connected){
    ws.send(JSON.stringify({type:'permission_response',request_id:requestId,allowed:allowed}));
  }
  const card=document.getElementById('perm-req-'+requestId);
  if(card){
    card.classList.add('resolved');
    const actions=card.querySelector('.perm-req-actions');
    if(actions)actions.remove();
    const msg=document.createElement('div');
    msg.className='perm-resolved-msg '+(allowed?'allowed':'denied');
    msg.textContent=allowed?'✓ Allowed by user':'✗ Denied by user';
    card.appendChild(msg);
  }
  addLog('Permission '+(allowed?'granted':'denied')+' for request '+requestId.substring(0,8),allowed?'info':'warn');
}

// 鈹€鈹€ Init 鈹€鈹€
document.addEventListener('DOMContentLoaded',()=>{loadHist();renderPerms();if(!msgHist.length)addLog('RustAgent ready','info');updateStatus()});
</script>
